name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hotel_db
          POSTGRES_USER: hotel_user
          POSTGRES_PASSWORD: hotel_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://hotel_user:hotel_pass@localhost:5432/hotel_db
        run: python manage.py migrate

      - name: Run tests       
        env:
          DATABASE_URL: postgres://hotel_user:hotel_pass@localhost:5432/hotel_db
        run: python manage.py test

      - name: Build Docker image
        run: docker build -t hotel-app .